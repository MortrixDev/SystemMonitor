<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Monitor</title>
  <style>
    body {
      font-family: sans-serif;
      background: #222;
      color: #fff;
      padding: 20px;
    }
  </style>
  <script defer>
    async function fetchStats() {
      try {
        const res = await fetch('http://localhost:5000/stats');
        const data = await res.json();

        document.getElementById('time').innerText = new Date(data.currentTime).toLocaleTimeString();
        document.getElementById('cpu').innerText = data.cpuUsagePercentage;
        document.getElementById('mem').innerText = `${data.memoryUsageMb} / ${data.memoryMaxMb}`;
        document.getElementById('batt').innerText = data.batteryPercentage !== null ? `${data.batteryPercentage}%` : "N/A";

      } catch (error) {
        console.error('Error fetching stats:', error);
      }
    }

    fetchStats();
    setInterval(fetchStats, 1000);
  </script>
</head>

<body>
  <h2>System Stats</h2>
  <div class="stat"><span class="label">CPU:</span> <span id="cpu">--</span>%</div>
  <div class="stat"><span class="label">Memory:</span> <span id="mem">--</span> MB</div>
  <div class="stat"><span class="label">Battery:</span> <span id="batt">--</span></div>
</body>
